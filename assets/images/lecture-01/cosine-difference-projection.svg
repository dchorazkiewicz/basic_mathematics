<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-labelledby="title desc">
  <title id="title">Projection onto a rotated unit direction</title>
  <desc id="desc">The unit vector at angle alpha is decomposed into components parallel and perpendicular to the unit direction at angle beta.</desc>
  <defs>
    <marker id="blueArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2f6f9f"/></marker>
    <marker id="greenArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#3f735f"/></marker>
  </defs>
  <rect width="800" height="520" fill="#f5f8fa"/>
  <line x1="120" y1="410" x2="690" y2="130" stroke="#2f6f9f" stroke-width="3" marker-end="url(#blueArrow)"/>
  <line x1="200" y1="470" x2="470" y2="40" stroke="#a9b2ba" stroke-width="2" stroke-dasharray="8 7"/>
  <line x1="200" y1="410" x2="505" y2="170" stroke="#3f735f" stroke-width="5" marker-end="url(#greenArrow)"/>
  <line x1="505" y1="170" x2="565" y2="292" stroke="#b1782b" stroke-width="4"/>
  <line x1="200" y1="410" x2="565" y2="292" stroke="#18212b" stroke-width="5" marker-end="url(#greenArrow)"/>
  <circle cx="200" cy="410" r="6" fill="#18212b"/>
  <circle cx="505" cy="170" r="7" fill="#3f735f"/>
  <circle cx="565" cy="292" r="7" fill="#18212b"/>
  <polyline points="505,170 530,157 543,182" fill="none" stroke="#66717d" stroke-width="2"/>
  <text x="575" y="290" font-family="serif" font-size="27" fill="#18212b">A=(cos α, sin α)</text>
  <text x="590" y="142" font-family="serif" font-size="27" fill="#2f6f9f">eβ=(cos β, sin β)</text>
  <text x="315" y="248" font-family="serif" font-size="26" fill="#3f735f">λeβ</text>
  <text x="530" y="218" font-family="serif" font-size="26" fill="#b1782b">μnβ</text>
  <text x="215" y="444" font-family="serif" font-size="23" fill="#18212b">O</text>
  <text x="320" y="430" font-family="sans-serif" font-size="20" fill="#66717d">λ is the signed projection onto eβ</text>
</svg>