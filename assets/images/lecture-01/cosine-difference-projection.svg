<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-labelledby="title desc">
  <title id="title">Orthogonal projection in the unit-circle proof</title>
  <desc id="desc">Triangle OAB has OA and OB of length one. The perpendicular from A to line OB meets it at H, giving OH equal to cosine delta, AH equal to sine delta, and BH equal to one minus cosine delta.</desc>
  <rect width="800" height="520" fill="#f5f8fa"/>
  <line x1="135" y1="410" x2="700" y2="170" stroke="#66717d" stroke-width="2"/>
  <line x1="190" y1="410" x2="545" y2="258" stroke="#3f735f" stroke-width="5"/>
  <line x1="190" y1="410" x2="470" y2="105" stroke="#2f6f9f" stroke-width="5"/>
  <line x1="470" y1="105" x2="392" y2="323" stroke="#b1782b" stroke-width="4"/>
  <line x1="470" y1="105" x2="545" y2="258" stroke="#18212b" stroke-width="4"/>
  <circle cx="190" cy="410" r="7" fill="#18212b"/>
  <circle cx="470" cy="105" r="7" fill="#2f6f9f"/>
  <circle cx="545" cy="258" r="7" fill="#3f735f"/>
  <circle cx="392" cy="323" r="7" fill="#b1782b"/>
  <polyline points="392,323 411,331 419,312" fill="none" stroke="#66717d" stroke-width="2"/>
  <path d="M268 410 A78 78 0 0 0 248 360" fill="none" stroke="#b1782b" stroke-width="4"/>
  <text x="169" y="443" font-family="serif" font-size="25" fill="#18212b">O</text>
  <text x="477" y="93" font-family="serif" font-size="25" fill="#2f6f9f">A</text>
  <text x="553" y="255" font-family="serif" font-size="25" fill="#3f735f">B</text>
  <text x="367" y="349" font-family="serif" font-size="25" fill="#b1782b">H</text>
  <text x="294" y="344" font-family="serif" font-size="24" fill="#3f735f">OH = cos δ</text>
  <text x="420" y="210" font-family="serif" font-size="24" fill="#b1782b">AH = sin δ</text>
  <text x="447" y="306" font-family="serif" font-size="24" fill="#18212b">BH = 1 − cos δ</text>
  <text x="254" y="376" font-family="serif" font-size="24" fill="#b1782b">δ</text>
  <text x="250" y="455" font-family="sans-serif" font-size="20" fill="#66717d">OA = OB = 1</text>
</svg>