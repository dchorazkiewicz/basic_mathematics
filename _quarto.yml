project:
  type: website
  output-dir: _site

website:
  title: "Mathematical Stories"
  site-url: "https://dchorazkiewicz.github.io/basic_mathematics/"
  repo-url: "https://github.com/dchorazkiewicz/basic_mathematics"
  repo-actions: [source, issue]
  search: true
  page-navigation: true
  bread-crumbs: true
  back-to-top-navigation: true
  navbar:
    background: "#10233f"
    foreground: light
    pinned: true
    left:
      - href: index.qmd
        text: Home
      - href: chapter-01/index.qmd
        text: Cartesian Geometry and Coordinates
    right:
      - icon: github
        href: "https://github.com/dchorazkiewicz/basic_mathematics"
        aria-label: GitHub
  sidebar:
    style: floating
    search: false
    collapse-level: 2
    border: false
    contents:
      - href: index.qmd
        text: Home
      - section: "Chapter 1 — Cartesian Geometry and Coordinates"
        href: chapter-01/index.qmd
        contents:
          - href: chapter-01/constructing-coordinates.qmd
            text: Constructing Cartesian coordinates
          - href: chapter-01/graphs-and-intersections.qmd
            text: Graphs and intersections
          - href: chapter-01/euclidean-reference.qmd
            text: Euclidean reference
          - href: chapter-01/review-exercises.qmd
            text: Review exercises
  page-footer:
    left: "Mathematical Stories"
    right: "An interactive mathematical text"
    border: true

format:
  html:
    theme:
      light: [litera, styles.scss]
      dark: [darkly, styles.scss]
    css: chapter.css
    toc: true
    toc-depth: 3
    toc-title: "On this page"
    number-sections: true
    html-math-method: mathjax
    smooth-scroll: true
    anchor-sections: true
    include-after-body: figures.html

lang: en
