<section id="graphs" class="section">
  <h2>Families controlled by parameters</h2>
  <p>After understanding how a formula generates points, we can let parameters control an entire family of geometric sets. A parameter changes the rule itself, not merely the current input.</p>

  <figure class="figure-panel jsx-panel equation-family-panel" data-fullscreen-panel tabindex="0">
    <div class="figure-toolbar">
      <div>
        <span class="figure-title">Families of equations</span>
        <span class="equation-general" data-general-equation>General form: $(x-h)^2+(y-k)^2=r^2$</span>
        <span class="figure-step-title" data-current-equation>Current values: $x^2+y^2=4$</span>
        <span class="equation-meaning" data-parameter-meaning>$h,k$ locate the centre; $r$ is the radius.</span>
      </div>
      <button class="icon-button" type="button" data-fullscreen aria-label="Open equation families in full screen">⛶</button>
    </div>

    <div class="curve-switcher" role="group" aria-label="Choose a geometric family">
      <button class="curve-mode is-active" type="button" data-curve-mode="circle">Circle</button>
      <button class="curve-mode" type="button" data-curve-mode="disk">Disk</button>
      <button class="curve-mode" type="button" data-curve-mode="line">Line</button>
      <button class="curve-mode" type="button" data-curve-mode="parabola">Parabola</button>
    </div>

    <div class="figure-stage jsx-stage">
      <div id="equation-family-board" class="jxgbox" data-equation-families aria-label="Interactive parameterized graphs"></div>
    </div>

    <div class="parameter-controls" aria-label="Graph parameters">
      <label class="parameter-control" data-parameter><span><span data-parameter-label>h</span> = <output data-parameter-value>0</output></span><input type="range" aria-label="First parameter"></label>
      <label class="parameter-control" data-parameter><span><span data-parameter-label>k</span> = <output data-parameter-value>0</output></span><input type="range" aria-label="Second parameter"></label>
      <label class="parameter-control" data-parameter><span><span data-parameter-label>r</span> = <output data-parameter-value>2</output></span><input type="range" aria-label="Third parameter"></label>
    </div>

    <figcaption class="figure-caption">Switch between families and change their parameters. The general form remains fixed while the current member of the family changes.</figcaption>
  </figure>
</section>
