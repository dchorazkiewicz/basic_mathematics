<section id="relations" class="section">
  <h2>When one input gives more than one point</h2>
  <p>Not every geometric equation defines $y$ as a function of $x$. For the circle $x^2+y^2=r^2$, fixing $x$ may produce two values of $y$:</p>
  <div class="math-block">$$y=\pm\sqrt{r^2-x^2}.$$</div>

  <figure class="figure-panel jsx-panel relation-panel" data-fullscreen-panel tabindex="0">
    <div class="figure-toolbar">
      <div>
        <span class="figure-title">A circle as a relation</span>
        <span class="figure-step-title" data-relation-equation>$x^2+y^2=9$</span>
      </div>
      <button class="icon-button" type="button" data-fullscreen aria-label="Open circle relation in full screen">⛶</button>
    </div>

    <div class="relation-readout" aria-live="polite">
      <span data-relation-input>$x=1$</span>
      <span data-relation-solutions>$y=\pm\sqrt{8}$</span>
      <span data-relation-points>two points</span>
    </div>

    <div class="figure-stage jsx-stage">
      <div id="circle-relation-board" class="jxgbox" data-circle-relation aria-label="Interactive vertical-line test for a circle"></div>
    </div>

    <div class="parameter-controls" style="--parameter-count:2">
      <label class="parameter-control">
        <span>radius $r$ = <output data-relation-r>3</output></span>
        <input type="range" min="1" max="4" step="0.5" value="3" data-relation-r-slider aria-label="Circle radius">
      </label>
      <label class="parameter-control">
        <span>chosen $x$ = <output data-relation-x>1</output></span>
        <input type="range" min="-3" max="3" step="0.25" value="1" data-relation-x-slider aria-label="Chosen x coordinate">
      </label>
    </div>

    <figcaption class="figure-caption">The vertical line at the chosen $x$ meets the circle in zero, one or two points. Two intersections mean that the circle is not the graph of a single-valued function $y=f(x)$.</figcaption>
  </figure>
</section>
