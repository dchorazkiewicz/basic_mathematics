site_name: Mathematical Stories
site_description: A course in analytical geometry, linear algebra and calculus.
site_url: https://dchorazkiewicz.github.io/basic_mathematics/
repo_url: https://github.com/dchorazkiewicz/basic_mathematics
repo_name: dchorazkiewicz/basic_mathematics

docs_dir: docs
site_dir: site_build
strict: true
exclude_docs: |
  lecture-*/sections/*.md

theme:
  name: null
  custom_dir: theme

nav:
  - Home: index.md
  - Lecture 01 · Cartesian Geometry and Coordinates: lecture-01/index.md
  - Lecture 02 · Vectors, Bases, and Coordinate Systems: lecture-02/index.md
  - Lecture 03 · Lines and Planes: lecture-03/index.md
  - Lecture 04 · Conic Sections: lecture-04/index.md
  - Authoring and deployment: authoring-guide.md

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: docs
      check_paths: true
  - toc:
      permalink: false

plugins:
  - search

copyright: Copyright &copy; Damian Chorążkiewicz
