site_name: Mathematical Stories
site_description: A constructive course in analytical geometry, linear algebra and calculus
site_url: https://dchorazkiewicz.github.io/basic_mathematics/
repo_url: https://github.com/dchorazkiewicz/basic_mathematics
repo_name: dchorazkiewicz/basic_mathematics

strict: true
site_dir: site_build

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

watch:
  - docs
  - overrides

theme:
  name: material
  custom_dir: overrides
  language: en
  font:
    text: Source Sans 3
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

nav:
  - Home: index.md
  - Part I · Analytical Geometry:
      - Lecture 1 · Cartesian Geometry and Coordinates:
          - chapter-01/index.md
          - Constructing Cartesian coordinates: chapter-01/constructing-coordinates.md
          - Graphs and intersections: chapter-01/graphs-and-intersections.md
          - Euclidean reference: chapter-01/euclidean-reference.md
          - Review exercises: chapter-01/review-exercises.md
      - Lecture 2 · Vectors, Bases, and Coordinate Systems:
          - lecture-02/index.md
          - From points to vectors: lecture-02/01-from-points.md
          - Addition and subtraction: lecture-02/02-addition.md

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/jsxgraph@1.10.1/distrib/jsxgraphcore.js
  - javascripts/course.js
  - javascripts/point-vectors.js
  - javascripts/vector-addition.js

extra_css:
  - https://cdn.jsdelivr.net/npm/jsxgraph@1.10.1/distrib/jsxgraph.css
  - stylesheets/extra.css
  - stylesheets/course.css

copyright: Copyright &copy; Damian Chorążkiewicz
