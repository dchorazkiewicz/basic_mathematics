<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">Reduced right-triangle construction</title>
  <desc id="desc">Triangle OAB with OA and OB equal to one. The perpendicular from A to line OB meets it at H. The diagram marks delta, OH equal to cosine delta, AH equal to sine delta, and HB equal to one minus cosine delta.</desc>
  <rect width="900" height="560" fill="#f5f8fa"/>

  <line x1="120" y1="430" x2="785" y2="145" stroke="#9aa6b2" stroke-width="2.5"/>
  <line x1="175" y1="430" x2="625" y2="237" stroke="#3f735f" stroke-width="7"/>
  <line x1="175" y1="430" x2="505" y2="92" stroke="#2f6f9f" stroke-width="7"/>
  <line x1="505" y1="92" x2="625" y2="237" stroke="#18212b" stroke-width="5"/>
  <line x1="505" y1="92" x2="449" y2="313" stroke="#b1782b" stroke-width="6"/>

  <polyline points="449,313 469,321 477,301" fill="none" stroke="#66717d" stroke-width="3"/>
  <path d="M270 430 A95 95 0 0 0 246 365" fill="none" stroke="#b1782b" stroke-width="4"/>

  <circle cx="175" cy="430" r="8" fill="#18212b"/>
  <circle cx="505" cy="92" r="9" fill="#2f6f9f"/>
  <circle cx="449" cy="313" r="8" fill="#b1782b"/>
  <circle cx="625" cy="237" r="9" fill="#3f735f"/>

  <g fill="#fff" fill-opacity="0.96" stroke="#d7dee4" stroke-width="1.5">
    <rect x="139" y="442" width="50" height="40" rx="11"/>
    <rect x="493" y="40" width="50" height="40" rx="11"/>
    <rect x="425" y="326" width="50" height="40" rx="11"/>
    <rect x="634" y="212" width="50" height="40" rx="11"/>
    <rect x="280" y="192" width="104" height="40" rx="10"/>
    <rect x="275" y="392" width="106" height="40" rx="10"/>
    <rect x="330" y="338" width="158" height="40" rx="10"/>
    <rect x="473" y="185" width="152" height="40" rx="10"/>
    <rect x="485" y="277" width="205" height="40" rx="10"/>
    <rect x="237" y="348" width="44" height="36" rx="10"/>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="153" y="470" font-size="28" fill="#18212b">O</text>
    <text x="507" y="69" font-size="28" fill="#2f6f9f">A</text>
    <text x="438" y="355" font-size="28" fill="#b1782b">H</text>
    <text x="647" y="241" font-size="28" fill="#3f735f">B</text>
    <text x="295" y="220" font-size="25" fill="#2f6f9f">OA = 1</text>
    <text x="291" y="420" font-size="25" fill="#3f735f">OB = 1</text>
    <text x="345" y="366" font-size="24" fill="#3f735f">OH = cos δ</text>
    <text x="489" y="213" font-size="24" fill="#b1782b">AH = sin δ</text>
    <text x="500" y="305" font-size="24" fill="#18212b">HB = 1 − cos δ</text>
    <text x="250" y="374" font-size="24" fill="#b1782b">δ</text>
  </g>
</svg>