<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Basic Euclidean constructions</title>
  <desc id="desc">Points, intersecting straight lines, perpendicular lines, and circles constructed in a Euclidean plane.</desc>
  <rect width="960" height="360" rx="24" fill="#f7f4ee"/>
  <g stroke="#182433" stroke-width="4" stroke-linecap="round" fill="none">
    <line x1="70" y1="285" x2="365" y2="65"/>
    <line x1="85" y1="85" x2="390" y2="290"/>
    <line x1="505" y1="300" x2="505" y2="55"/>
    <line x1="405" y1="178" x2="610" y2="178"/>
    <circle cx="745" cy="178" r="112"/>
    <circle cx="745" cy="178" r="58" stroke-dasharray="10 12"/>
  </g>
  <g fill="#b84a3a" stroke="#f7f4ee" stroke-width="4">
    <circle cx="218" cy="174" r="10"/>
    <circle cx="505" cy="178" r="10"/>
    <circle cx="745" cy="178" r="10"/>
    <circle cx="833" cy="108" r="10"/>
  </g>
  <g fill="#182433" font-family="system-ui, sans-serif" font-size="22">
    <text x="190" y="154">P</text>
    <text x="520" y="165">O</text>
    <text x="760" y="165">C</text>
    <text x="848" y="100">Q</text>
  </g>
  <g fill="#5f6b76" font-family="system-ui, sans-serif" font-size="18">
    <text x="98" y="326">intersecting lines</text>
    <text x="430" y="326">perpendicular lines</text>
    <text x="670" y="326">circles from a centre</text>
  </g>
</svg>
